name: Post-Tournament Results

on:
  schedule:
    - cron: '0 9 * * 1'       # Every Monday 09:00 UTC (18:00 JST)
  workflow_dispatch:            # Manual trigger

permissions:
  contents: write              # For creating releases

concurrency:
  group: "golf-pipeline"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      # --- DB Restore (cache -> release fallback) ---
      - name: Restore data from cache
        uses: actions/cache/restore@v4
        id: db-cache
        with:
          path: |
            data/golfgame.db
            data/pga_stats.db
            data/models
            data/output
          key: golfdata-${{ github.run_id }}
          restore-keys: golfdata-

      - name: Restore data from release backup
        if: steps.db-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p data/models data/output
          gh release download db-backup -D /tmp/db-restore/ 2>/dev/null && {
            cp /tmp/db-restore/golfgame.db data/ 2>/dev/null || true
            cp /tmp/db-restore/pga_stats.db data/ 2>/dev/null || true
            cp /tmp/db-restore/*.joblib data/models/ 2>/dev/null || true
            cp /tmp/db-restore/*.json data/models/ 2>/dev/null || true
            cp /tmp/db-restore/*.html data/output/ 2>/dev/null || true
            echo "[OK] Restored data from release backup"
          } || echo "[INFO] No backup release found, starting fresh"
        env:
          GH_TOKEN: ${{ github.token }}

      # --- Minimal config for result collection ---
      - name: Generate config.yaml
        run: |
          cat > config.yaml << 'CONFIGEOF'
          espn:
            base_url: "https://site.api.espn.com/apis/site/v2/sports/golf/pga"
            scoreboard_endpoint: "/scoreboard"
            timeout: 30
          CONFIGEOF

      # --- Collect results ---
      - name: Collect tournament results
        run: uv run python -m src.result_collector

      # --- Retrain EGS models with latest results ---
      - name: Retrain EGS models
        run: |
          if [ -f data/pga_stats.db ]; then
            echo "[INFO] Retraining EGS models with latest data..."
            uv run python -m src.egs_model_trainer && echo "[OK] EGS models retrained" || echo "[WARN] EGS training failed (non-critical)"
          else
            echo "[INFO] No pga_stats.db found, skipping EGS training"
          fi

      # --- Generate training history report ---
      - name: Generate EGS training history report
        run: |
          uv run python -c "
          from src.egs_training_report import generate_training_report
          generate_training_report()
          " || echo "[WARN] Training report generation failed (non-critical)"

      # --- Regenerate portal page ---
      - name: Update portal page
        run: |
          uv run python -c "
          from src.portal import generate_portal
          generate_portal()
          " || echo "[WARN] Portal update failed (non-critical)"

      # --- DB Health Check ---
      - name: DB health check
        if: always()
        run: |
          uv run python -c "
          import sqlite3, os
          from datetime import datetime

          print('=' * 60)
          print('  DB HEALTH CHECK (results)')
          print('=' * 60)

          gdb = 'data/golfgame.db'
          if os.path.exists(gdb):
              size_mb = os.path.getsize(gdb) / 1024 / 1024
              conn = sqlite3.connect(gdb)
              conn.row_factory = sqlite3.Row
              t_count = conn.execute('SELECT COUNT(*) FROM tournaments').fetchone()[0]
              t_results = conn.execute(\"SELECT COUNT(*) FROM tournaments WHERE status='results_saved'\").fetchone()[0]
              t_odds = conn.execute(\"SELECT COUNT(*) FROM tournaments WHERE status='odds_saved'\").fetchone()[0]
              r_count = conn.execute('SELECT COUNT(*) FROM results').fetchone()[0]
              latest = conn.execute('SELECT name, end_date, status FROM tournaments ORDER BY id DESC LIMIT 1').fetchone()

              # Pending collection check
              from datetime import date
              pending = conn.execute(
                  \"SELECT COUNT(*) FROM tournaments WHERE status='odds_saved' AND end_date IS NOT NULL AND end_date < ?\",
                  (date.today().isoformat(),)
              ).fetchone()[0]
              conn.close()

              print(f'  golfgame.db: {size_mb:.1f} MB')
              print(f'    tournaments:  {t_count} (results={t_results}, odds={t_odds})')
              print(f'    results:      {r_count}')
              print(f'    pending:      {pending} tournament(s) awaiting collection')
              if latest:
                  print(f'    latest:       {latest[\"name\"]} ({latest[\"end_date\"]}) [{latest[\"status\"]}]')
          else:
              print('  golfgame.db: NOT FOUND')

          print('=' * 60)
          "

      # --- Save data (cache + release backup) ---
      - name: Save data to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/golfgame.db
            data/pga_stats.db
            data/models
            data/output
          key: golfdata-${{ github.run_id }}

      - name: Backup data to release
        if: always()
        run: |
          FILES=""
          [ -f data/golfgame.db ] && FILES="$FILES data/golfgame.db"
          [ -f data/pga_stats.db ] && FILES="$FILES data/pga_stats.db"
          for f in data/models/*.joblib data/models/*.json; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          for f in data/output/*.html; do
            [ -f "$f" ] && FILES="$FILES $f"
          done

          if [ -n "$FILES" ]; then
            gh release delete db-backup --yes 2>/dev/null || true
            gh release create db-backup $FILES \
              --title "DB Backup" \
              --notes "Results collected $(date -u +%Y-%m-%d)"
            echo "[OK] Backup saved to release"
          else
            echo "[WARN] No data files to backup"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
